<div class="post-control-panel">
  <div class="container-fluid mx-auto flex justify-start items-center">
    <div class="flex gap-4 filters">
      <app-dropdown
        label="Category"
        [selectedOption]="selectedCategory"
        [options]="categories"
        (selectedOptionChange)="onCategoryChange($event)"
      ></app-dropdown>
      <app-dropdown
        label="Tag"
        [selectedOption]="selectedTag"
        [options]="tags"
        (selectedOptionChange)="onTagChange($event)"
      ></app-dropdown>
    </div>
  </div>
</div>
