<div class="news-control-panel">
  <div class="container-fluid mx-auto flex justify-between items-center">
    <div class="flex gap-4 filters">
      <app-dropdown
        label="Project"
        [selectedOption]="selectedProject"
        [options]="projects"
        (selectedOptionChange)="onProjectChange($event)"
      ></app-dropdown>
    </div>
    <app-dropdown
      label="Language"
      [selectedOption]="currentLang()"
      [options]="['en', 'ru']"
      (selectedOptionChange)="onLanguageChange($event)"
    ></app-dropdown>
  </div>
</div>
