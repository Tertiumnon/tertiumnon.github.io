<app-page-loader [isLoading]="isLoading()"></app-page-loader>

<div class="container-fluid">
  <div class="content">
    <h1>Articles</h1>

    <div class="article-list">
      <div *ngFor="let article of articleList(); index as i" class="article">
        <div class="article-date">{{ article.publishedAt }}</div>
        <a [routerLink]="article.link">{{ article.title }}</a>
      </div>
    </div>
  </div>
</div>
