<app-page-loader [isLoading]="isLoading()"></app-page-loader>

<app-news-control-panel
  [projects]="projects()"
  [selectedProject]="selectedProject()"
  [onProjectChange]="onProjectChange.bind(this)"
></app-news-control-panel>

<div class="container-fluid" style="margin-top: 40px;">
  <div class="news-container">
  <div class="content">
    <h1>News</h1>

    <div class="news-feed">
      @for (newsItem of filteredNews(); track newsItem.link) {
      <div class="news-bubble">
        <p class="news-text">{{ newsItem.title }}</p>
        <div class="news-info">
          <span class="news-time">{{ newsItem.publishedAt }}</span>
          @if (newsItem.category) {
            <span class="news-badge">{{ newsItem.category }}</span>
          }
          @if (newsItem.project) {
            <span class="news-project">{{ newsItem.project }}</span>
          }
        </div>
      </div>
      }
    </div>
  </div>
  </div>
</div>
